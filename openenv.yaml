name: llm-output-firewall
version: "0.9.0"
description: "An OpenEnv-compliant RL environment for detecting toxic, hallucinated, biased, and adversarial LLM outputs"
framework: fastapi
port: 7860
runtime: python3.10
author: "Kottana Indra Kiran"
license: MIT
tasks:
  - id: 1
    name: binary_toxicity_classification
    difficulty: easy
  - id: 2
    name: multidimensional_risk_scoring
    difficulty: medium
  - id: 3
    name: adversarial_jailbreak_detection
    difficulty: hard
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  health: GET /health
